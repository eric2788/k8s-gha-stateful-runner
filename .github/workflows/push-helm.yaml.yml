name: Release Helm Chart to GitHub Packages

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract chart version
        id: chart-version
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          CHART_NAME=${{ github.event.repository.name }}
          CHART_VERSION=${{ steps.chart-version.outputs.version }}
          echo "Packaging $CHART_NAME version $CHART_VERSION"
          helm package . --version "$CHART_VERSION"
          echo "Pushing to GHCR"
          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
