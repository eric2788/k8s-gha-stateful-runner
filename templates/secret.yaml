{{- if not $.Values.runner.secret }}
{{- if not $.Values.runner.token }}
  {{- fail "runner.token is required when runner.secret is not set. Provide a GitHub Actions runner registration token or set runner.secret to reference an existing Secret." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "actions-runner.fullname" $ }}-secret
  {{- include "actions-runner.optionalNamespace" $ }}
data:
  ui_token: {{ $.Values.runner.token | trim | b64enc | quote }}
{{- end }}
