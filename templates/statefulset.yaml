apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "actions-runner.fullname" $ }}
  {{- include "actions-runner.optionalNamespace" $ }}
  labels:
    {{- include "actions-runner.labels" $ | nindent 4 }}
spec:
  replicas: {{ $.Values.runner.count }}
  selector:
    matchLabels:
      {{- include "actions-runner.selectorLabels" $ | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  template:
    metadata:
      labels:
        {{- include "actions-runner.selectorLabels" $ | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "actions-runner.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ $.Values.runner.terminationGracePeriodSeconds }}
      {{- with $.Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $.Values.podAntiAffinity.enabled $.Values.affinity }}
      affinity:
        {{- if $.Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          {{- if eq $.Values.podAntiAffinity.type "required" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "actions-runner.selectorLabels" $ | nindent 18 }}
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "actions-runner.selectorLabels" $ | nindent 20 }}
                topologyKey: kubernetes.io/hostname
          {{- end }}
        {{- end }}
        {{- with $.Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      initContainers:
        - name: runner-init
          image: {{ include "actions-runner.image" $ }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              if [ -f "/creds/.credentials" ]; then
                echo "Already configured, skipping."
                exit 0
              fi

              /home/runner/config.sh \
                --unattended \
                --url "${RUNNER_URL}" \
                --token "${RUNNER_TOKEN}" \
                --name "${HOSTNAME}" \
                --labels "${RUNNER_LABELS}" \
                --work /home/runner/_work \
                --replace \
                --disableupdate

              cp /home/runner/.runner      /creds/.runner
              cp /home/runner/.credentials /creds/.credentials
              [ -f /home/runner/.credentials_rsaparams ] && \
                cp /home/runner/.credentials_rsaparams /creds/.credentials_rsaparams

              echo "Credentials saved to /creds."
          env:
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "actions-runner.secretName" $ }}
                  key: ui_token
            - name: RUNNER_URL
              value: {{ $.Values.runner.repoUrl | quote }}
            - name: RUNNER_LABELS
              value: {{ $.Values.runner.labels | join "," | trim | quote }}
            {{- with $.Values.runner.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: runner-creds
              mountPath: /creds
            - name: runner-work
              mountPath: /home/runner/_work
              {{- include "actions-runner.workspaceMountSubPath" $ }}
          {{- with $.Values.runner.initResources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      containers:
        - name: runner
          image: {{ include "actions-runner.image" $ }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /creds/.credentials      /home/runner/.credentials
              cp /creds/.runner           /home/runner/.runner
              [ -f /creds/.credentials_rsaparams ] && \
                cp /creds/.credentials_rsaparams /home/runner/.credentials_rsaparams
              /home/runner/run.sh
          {{- if or $.Values.runner.extraEnv $.Values.dind.enable }}
          env:
            {{- with $.Values.runner.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if $.Values.dind.enable }}
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          {{- end }}
          {{- end }}
          {{- if $.Values.runner.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    # Trigger graceful runner shutdown, then wait up to maxWaitSeconds for current job to finish.
                    if pgrep -f "Runner.Listener" > /dev/null; then
                     pkill -TERM -f "Runner.Listener" || true
                    fi
                    end=$((SECONDS + {{ $.Values.runner.preStop.maxWaitSeconds }}))
                    while pgrep -f "Runner.Listener" > /dev/null; do
                      if [ "$SECONDS" -ge "$end" ]; then
                        echo "preStop timeout reached ({{ $.Values.runner.preStop.maxWaitSeconds }}s), continuing termination"
                        break
                      fi
                      echo "Waiting for Runner.Listener to exit..."
                      sleep {{ $.Values.runner.preStop.pollIntervalSeconds }}
                    done
          {{- end }}
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - test -f /home/runner/.runner
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pgrep -f "Runner.Listener"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: runner-creds
              mountPath: /creds
            - name: runner-work
              mountPath: /home/runner/_work
              {{- include "actions-runner.workspaceMountSubPath" $ }}
            {{- with $.Values.runner.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $.Values.runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if $.Values.dind.enable }}
        - name: dind
          image: {{ $.Values.dind.image }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          securityContext:
            privileged: true
          args:
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
            - --tls=false
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
            {{- with $.Values.dind.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: runner-work
              mountPath: /home/runner/_work
              {{- include "actions-runner.workspaceMountSubPath" $ }}
            {{- with $.Values.dind.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $.Values.dind.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $.Values.dind.pruneOnStop }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    {{- include "actions-runner.dindPrunePreStopScript" $ | nindent 20 }}
          {{- end }}
        {{- end }}

      {{- with include "actions-runner.podVolumes" $ | trim }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain

  volumeClaimTemplates:
    - metadata:
        name: runner-creds
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if $.Values.runner.storageClass }}
        storageClassName: {{ $.Values.runner.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.runner.credStorageSize }}
    {{- if and $.Values.workspace.enabled (not $.Values.workspace.existingClaim) }}
    - metadata:
        name: runner-work
        {{- with $.Values.workspace.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $.Values.workspace.labels }}
        labels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml $.Values.workspace.accessModes | nindent 10 }}
        {{- if $.Values.workspace.storageClass }}
        storageClassName: {{ $.Values.workspace.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.workspace.size }}
    {{- end }}
    {{- if and $.Values.dind.enable $.Values.dind.cachePersistence }}
    - metadata:
        name: docker-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if $.Values.dind.storageClass }}
        storageClassName: {{ $.Values.dind.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.dind.cacheSize | quote }}
    {{- end }}
