image: "ghcr.io/actions/actions-runner"
version: 2.333.0
imagePullPolicy: IfNotPresent
fullnameOverride: ""
includeNamespace: false
namespaceOverride: ""

serviceAccount:
  # Specifies whether the chart should create a ServiceAccount resource.
  # When false, the pod still uses serviceAccount.name if provided, otherwise it falls back to the namespace default ServiceAccount.
  create: true
  # Name of the ServiceAccount for the runner pod to use. If empty and create is true, the chart fullname is used.
  name: ""
  # Disable automatic mounting of the API credentials on the runner pod (recommended unless jobs need k8s access)
  automountServiceAccountToken: false
  # Annotations to add to the service account (e.g. for IAM role binding)
  annotations: {}

podDisruptionBudget:
  enabled: true
  # Minimum number of runners that must remain available during voluntary disruptions
  minAvailable: 1

# Pod-level security context applied to all containers (except dind which overrides)
securityContext:
  fsGroup: 1001

# Container-level security context applied to the runner and init containers
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Pod anti-affinity to spread runners across nodes
podAntiAffinity:
  enabled: true
  # preferred: soft constraint (works on single-node clusters)
  # required: hard constraint (pods will not schedule on same node)
  type: preferred

# Additional affinity rules (e.g. nodeAffinity, podAffinity). Appended to the
# chart-generated podAntiAffinity above; do not include podAntiAffinity here
# when podAntiAffinity.enabled is true.
affinity: {}

# Annotations to add to runner pods (e.g. for Prometheus monitoring)
podAnnotations: {}

runner:
  name: "gha-sts-runner"
  count: 3
  # Max time Kubernetes waits before force-killing the pod during termination.
  terminationGracePeriodSeconds: 600
  preStop:
    # When enabled, ask Runner.Listener to stop and wait for active Runner.Worker with a hard timeout.
    enabled: true
    maxWaitSeconds: 540
    pollIntervalSeconds: 5
  # Name of an existing Secret containing the key 'ui_token'. If set, runner.token is ignored.
  secret: ""
  # Runner registration token obtained from GitHub Settings → Actions → Runners → New runner.
  # Leave empty when providing runner.secret.
  token: ""
  # GitHub repository or organization URL (required), e.g. https://github.com/org/repo
  repoUrl: ""
  labels:
    - self-hosted
    - linux
    - gha-static
  # Additional environment variables for the runner container.
  extraEnv: []
  # Additional volume mounts to attach to the runner container (e.g. for caching).
  # Each entry follows the standard Kubernetes volumeMount spec.
  # Example:
  # extraVolumeMounts:
  #   - name: maven-cache
  #     mountPath: /home/runner/.m2
  extraVolumeMounts: []
  # Additional volumes to add to the pod spec for use with extraVolumeMounts.
  # Each entry follows the standard Kubernetes volume spec.
  # Example:
  # extraVolumes:
  #   - name: maven-cache
  #     persistentVolumeClaim:
  #       claimName: maven-cache-pvc
  extraVolumes: []
  # StorageClass for the credentials PVC. Defaults to the cluster default StorageClass.
  storageClass: ""
  # Storage size for the credentials PVC
  credStorageSize: "64Mi"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  # Resource limits for the init container (runs once per pod lifecycle)
  initResources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# Extra Kubernetes manifests to deploy alongside the chart.
# Supports Helm templating via tpl. Useful for resources like NetworkPolicy,
# ConfigMap, CronJob, etc. that are not managed by this chart.
# Example:
# extraManifests:
#   - apiVersion: networking.k8s.io/v1
#     kind: NetworkPolicy
#     metadata:
#       name: {{ include "actions-runner.fullname" . }}-egress
#     spec:
#       podSelector:
#         matchLabels:
#           {{- include "actions-runner.selectorLabels" . | nindent 10 }}
#       policyTypes:
#         - Egress
#       egress:
#         - ports:
#             - port: 443
#               protocol: TCP
#             - port: 53
#               protocol: UDP
extraManifests: []

dind:
  enable: false
  image: "docker:27-dind"
  # Additional environment variables for the DinD container.
  extraEnv: []
  # Additional volume mounts to attach to the DinD container.
  # Mounts can reference built-in or runner.extraVolumes-defined pod volumes.
  extraVolumeMounts: []
  # Enable persistent storage for the Docker layer cache (/var/lib/docker).
  # When false, an emptyDir is used and the cache is lost on pod restart.
  # When true, a PersistentVolumeClaim is created per pod via volumeClaimTemplates.
  cachePersistence: false
  # StorageClass for the docker-storage PVC. Defaults to the cluster default StorageClass.
  # Only used when cachePersistence is true.
  storageClass: ""
  # Size of the docker-storage PVC. Only used when cachePersistence is true.
  cacheSize: "10Gi"
  # Run `docker system prune -f` in a preStop lifecycle hook on the DinD container.
  # When enabled, dangling images and build cache are automatically removed on pod
  # termination/restart, helping limit PVC growth over time. Tagged images are preserved.
  # Note: the cache can still grow between restarts for long-running pods. Recommended when cachePersistence is true.
  pruneOnStop: false
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# Optional persistent workspace PVC for the runner's work directory.
# When enabled without existingClaim, a VolumeClaimTemplate is added to the StatefulSet,
# giving each pod its own dedicated workspace PVC.
# When enabled with existingClaim, the named PVC is mounted directly (shared across all pods).
# The existing credentials PVC (runner-creds) is unaffected by this setting.
workspace:
  enabled: false
  # StorageClass for the workspace PVC. Defaults to the cluster default StorageClass.
  storageClass: ""
  # Size of the workspace PVC.
  size: "10Gi"
  # Access modes for the workspace PVC.
  accessModes:
    - ReadWriteOnce
  # Optional sub-path within the volume to mount.
  subPath: ""
  # Optional sub-path expression for workspace volume mounts.
  # When set, this is used directly as volumeMount.subPathExpr.
  # Any variables referenced in the expression must be provided by user-defined env.
  subPathExpr: ""
  # Annotations to add to the workspace PVC metadata (only used with volumeClaimTemplates).
  annotations: {}
  # Labels to add to the workspace PVC metadata (only used with volumeClaimTemplates).
  labels: {}
  # Name of an existing PVC to use instead of creating a new one per pod.
  # When set, a volumeClaimTemplate is NOT created; the named PVC is mounted directly.
  # Note: using ReadWriteOnce with multiple replicas will cause scheduling conflicts.
  existingClaim: ""
